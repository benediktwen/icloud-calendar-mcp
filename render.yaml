services:
  - type: web
    name: icloud-calendar-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ICLOUD_USERNAME
        sync: false
      - key: ICLOUD_APP_PASSWORD
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_ALLOWED_USER
        value: benediktwen
      - key: SERVER_URL
        sync: false
      - key: TOKEN_STORE_KEY
        value: "mcp:icloud-calendar:token_store"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
